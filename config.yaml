# ============================================================
# QuantLLM 中心化配置
# 所有脚本通过 scripts/_config.py 读取本文件
# ============================================================

# 项目路径（自动检测，通常不需要修改）
# project_root: /opt/quant-llm

# ----------------------------------------------------------
# 数据路径
# ----------------------------------------------------------
data:
  training_dir: training-data          # 相对于 project_root
  ashare_dir: training-data/ashare
  futures_dir: training-data/futures
  etf_dir: training-data/etf
  cbond_dir: training-data/cbond

# ----------------------------------------------------------
# 模型配置
# ----------------------------------------------------------
model:
  base_model: unsloth/Qwen2.5-14B-bnb-4bit
  max_seq_length: 2048
  output_dir: output/quant-qwen2.5-14b-lora
  version: v1                               # 手动指定，评估时写入元信息

# ----------------------------------------------------------
# LoRA 配置
# ----------------------------------------------------------
lora:
  r: 16
  alpha: 16
  dropout: 0
  use_rslora: true
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# ----------------------------------------------------------
# 训练超参
# ----------------------------------------------------------
training:
  batch_size: 1
  gradient_accumulation_steps: 8       # 等效 batch_size=8
  learning_rate: 2.0e-4
  num_train_epochs: 3
  warmup_steps: 50
  bf16: true
  optim: adamw_8bit
  logging_steps: 50
  save_steps: 500
  save_total_limit: 3
  eval_steps: 500                      # 验证频率
  eval_ratio: 0.02                     # 验证集比例
  early_stopping_patience: 3           # 连续 N 次 eval loss 不降则停止
  seed: 42

# ----------------------------------------------------------
# Ollama 配置（数据增强用）
# ----------------------------------------------------------
ollama:
  url: http://127.0.0.1:11434/api/chat
  generation_model: qwen3:14b          # 种子扩展
  reasoning_model: deepseek-r1:32b     # 推理链增强
  temperature: 0.7
  timeout: 180                         # 秒

# ----------------------------------------------------------
# System Prompt（所有训练数据统一）
# ----------------------------------------------------------
system_prompt: 你是一个专业的量化交易专家，擅长策略开发、因子分析、回测评估和风险管理。本AI仅提供信息参考，不构成投资建议，据此交易风险自负。

# ----------------------------------------------------------
# 数据转换限制
# ----------------------------------------------------------
convert:
  ashare_limit: 5000
  futures_limit: 2000
  etf_limit: 2000
  cbond_limit: 1500

# ----------------------------------------------------------
# 评估配置
# ----------------------------------------------------------
eval:
  holdout_ratio: 0.02
  max_holdout: 100
  results_file: output/eval_results.json

# ----------------------------------------------------------
# 模拟盘风控配置（Phase 2）
# ----------------------------------------------------------
# ----------------------------------------------------------
# 交易评分阈值（Phase 2 模拟盘用）
# ----------------------------------------------------------
score_thresholds:
  buy: 70                              # score >= 此值触发买入
  sell: 30                             # score <= 此值触发卖出
  # 牛市/熊市自适应（牛市放宽，熊市收紧）
  bull_buy: 60
  bull_sell: 40
  bear_buy: 80
  bear_sell: 20
  # 牛熊判定：指数在 N 日均线上方且均线向上 = 牛市
  regime_ma_days: 120
  # 评分防抖：变化需超过此值才改变动作
  change_threshold: 10

risk_control:
  # 仓位控制
  max_position_pct: 0.10              # 单票最大仓位占总资产比例
  max_total_position_pct: 0.80        # 总仓位上限
  # 止损/止盈
  stop_loss_pct: -0.05               # 单票止损线（-5%）
  portfolio_stop_loss_pct: -0.30     # 组合止损线（亏30%清仓暂停，即70%A）
  take_profit_target: 2.0            # 目标净值倍数（翻倍止盈，提取利润）
  # 日度限制
  max_daily_loss_pct: -0.03          # 单日最大亏损（-3%触发暂停）
  max_daily_trades: 5                # 单日最大交易笔数
  # 市场环境
  turbulence_threshold: 3.0          # 波动率异常倍数（>3σ自动减仓）
  # 交易成本仿真
  slippage_pct: 0.0003               # 滑点（万分之三）
  commission_pct: 0.00025            # 佣金（万分之二点五）
  volume_limit_pct: 0.05             # 成交量限制（不超过当日总量5%）
